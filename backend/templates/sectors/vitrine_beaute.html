<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{HERO_TITLE}} — {{SECTOR}} · {{CITY}}</title>
  <link rel="stylesheet" href="{{GOOGLE_FONTS_URL}}" />
  <style>
    :root{--primary:{{PRIMARY_COLOR}};--secondary:{{SECONDARY_COLOR}};--font-h:'{{FONT_HEADING}}',serif;--font-b:'{{FONT_BODY}}',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font-b);background:var(--secondary);color:var(--primary)}
    h1,h2,h3{font-family:var(--font-h);font-weight:400;letter-spacing:.02em}
    .wrap{width:min(1100px,92vw);margin:0 auto}
    .nav{position:fixed;inset:0 0 auto;z-index:100;background:rgba(253,242,248,.95);backdrop-filter:blur(10px);border-bottom:1px solid #fce7f3}
    .nav-inner{display:flex;justify-content:space-between;align-items:center;padding:1rem 0}
    .logo{font-family:var(--font-h);font-size:1.5rem}
    .nav a{margin-left:1.5rem;font-size:.9rem;text-transform:uppercase;letter-spacing:.08em}
    .hero{min-height:90vh;margin-top:3.5rem;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;
      background:linear-gradient(to bottom,rgba(26,26,26,.4),rgba(26,26,26,.65)),url('https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=1920&q=80') center/cover}
    .hero h1{font-size:clamp(2.5rem,6vw,4rem);margin-bottom:1rem}
    .hero p{font-size:1.2rem;max-width:500px;margin:0 auto 2rem}
    .btn-glam{display:inline-block;padding:1rem 2.5rem;border:2px solid #fff;color:#fff;font-weight:600;letter-spacing:.1em;text-transform:uppercase;transition:all .3s}
    .btn-glam:hover{background:#fff;color:var(--primary)}
    section{padding:5rem 0}
    .title{text-align:center;font-size:2.25rem;margin-bottom:2.5rem}
    .tarifs{max-width:640px;margin:0 auto}
    .tarif{display:flex;justify-content:space-between;padding:1.25rem 0;border-bottom:1px solid #f3e8ee;transition:padding-left .2s}
    .tarif:hover{padding-left:.5rem}
    .tarif span:last-child{font-weight:600}
    .galerie{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
    .galerie img{width:100%;aspect-ratio:1;object-fit:cover;filter:grayscale(20%);transition:filter .3s,transform .3s}
    .galerie img:hover{filter:none;transform:scale(1.02)}
    .book{max-width:480px;margin:0 auto;background:#fff;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    .book input,.book select{width:100%;padding:.85rem;margin-bottom:1rem;border:1px solid #eee;font:inherit}
    .book button{width:100%;padding:1rem;background:var(--primary);color:#fff;border:none;font-weight:600;cursor:pointer;letter-spacing:.05em}
    .book button:hover{opacity:.9}
    .reveal{opacity:0;transform:translateY(30px);transition:.7s cubic-bezier(.2,.8,.2,1)}
    .reveal.visible{opacity:1;transform:none}
    @media(max-width:768px){.galerie{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <header class="nav"><div class="wrap nav-inner"><a href="#" class="logo">{{CLIENT_NAME}}</a>
    <nav><a href="#prestations">Prestations</a><a href="#galerie">Galerie</a><a href="#reservation">Réserver</a></nav></div></header>
  <section class="hero reveal"><div><h1>{{HERO_TITLE}}</h1><p>{{HERO_SUBTITLE}}</p><a href="#reservation" class="btn-glam">{{CTA_TEXT}}</a></div></section>
  <section id="prestations" class="reveal"><div class="wrap"><h2 class="title">Nos prestations</h2>
    <div class="tarifs">
      <div class="tarif"><span>{{SERVICE_1}}</span><span>à partir de 45€</span></div>
      <div class="tarif"><span>{{SERVICE_2}}</span><span>à partir de 55€</span></div>
      <div class="tarif"><span>{{SERVICE_3}}</span><span>à partir de 65€</span></div>
      <div class="tarif"><span>Forfait découverte</span><span>89€</span></div>
    </div></div></section>
  <section id="galerie" class="reveal" style="background:#fff"><div class="wrap"><h2 class="title">Galerie</h2>
    <div class="galerie">
      <img src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=500&q=80" alt="Avant/après" loading="lazy"/>
      <img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=500&q=80" alt="Salon" loading="lazy"/>
      <img src="https://images.unsplash.com/photo-1487412942497-957e87055f9c?w=500&q=80" alt="Style" loading="lazy"/>
      <img src="https://images.unsplash.com/photo-1633681926022-84c23e8cb04d?w=500&q=80" alt="Soin" loading="lazy"/>
      <img src="https://images.unsplash.com/photo-1516975080664-ed2fc6a32937?w=500&q=80" alt="Beauté" loading="lazy"/>
      <img src="https://images.unsplash.com/photo-1522336572468-97b06e8b0e4a?w=500&q=80" alt="Résultat" loading="lazy"/>
    </div></div></section>
  <section id="reservation" class="reveal"><div class="wrap"><h2 class="title">Réservation en ligne</h2>
    <form class="book" action="#" onsubmit="return false;">
      <input type="text" placeholder="Nom" required />
      <input type="tel" placeholder="Téléphone — {{PHONE}}" required />
      <select><option>{{SERVICE_1}}</option><option>{{SERVICE_2}}</option><option>{{SERVICE_3}}</option></select>
      <input type="email" placeholder="{{EMAIL}}" />
      <button type="submit">Réserver chez {{CLIENT_NAME}}</button>
    </form></div></section>
  <footer style="text-align:center;padding:2rem;color:#666;font-size:.9rem"><p>{{CLIENT_NAME}} · {{ADDRESS}} · {{CITY}}</p></footer>
  <script>document.querySelectorAll('.reveal').forEach(el=>new IntersectionObserver((e,o)=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('visible');o.unobserve(x.target)}}),{threshold:.1}).observe(el));</script>
</body>
</html>
